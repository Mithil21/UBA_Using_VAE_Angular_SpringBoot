# ?? Server ??????????????????????????????????????????????
server.port=8080

# ?? Project Loom Virtual Threads (Pillar 1) ?????????????
spring.threads.virtual.enabled=true

# ?? MySQL DataSource ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/forensic_audit?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? HikariCP Tuning (Pillar 2) ???????????????????????????
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ?? JPA ??????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? Logging ??????????????????????????????????????????????
logging.level.com.forensic.audit=DEBUG

# ?? Hyperledger Fabric Gateway (Pillar 5) ???????????????????
# Set these to real paths when connecting to a live Fabric network.
# Leave mspCertPath/mspKeyPath/tlsCertPath unset to skip Fabric in dev.
fabric.peer.endpoint=localhost:7051
fabric.msp.id=Org1MSP
fabric.channel.name=mychannel
fabric.chaincode.name=uba-audit
#fabric.peer.tlsCertPath=/path/to/tls/ca.crt
#fabric.msp.certPath=/path/to/msp/signcerts/cert.pem
#fabric.msp.keyPath=/path/to/msp/keystore/key.pem
