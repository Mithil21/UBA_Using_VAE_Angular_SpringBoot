# ?? Server ??????????????????????????????????????????????
server.port=8080

# ?? Project Loom Virtual Threads (Pillar 1) ?????????????
spring.threads.virtual.enabled=true

# H2 DataSource
spring.datasource.url=jdbc:h2:mem:forensic_audit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ?? Logging ??????????????????????????????????????????????
logging.level.com.forensic.audit=DEBUG

# ?? Hyperledger Fabric Gateway (Pillar 5) ???????????????????
# Set these to real paths when connecting to a live Fabric network.
# Leave mspCertPath/mspKeyPath/tlsCertPath unset to skip Fabric in dev.
fabric.peer.endpoint=localhost:7051
fabric.msp.id=Org1MSP
fabric.channel.name=mychannel
fabric.chaincode.name=uba-audit
#fabric.peer.tlsCertPath=/path/to/tls/ca.crt
#fabric.msp.certPath=/path/to/msp/signcerts/cert.pem
#fabric.msp.keyPath=/path/to/msp/keystore/key.pem


# ── Kafka ────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=uba-vae-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

